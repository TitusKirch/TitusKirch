# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Sync Projects

on:
  push:
    branches: [main]
    paths:
      - projects.yml
      - scripts/render-readme.mjs
      - .github/workflows/sync-projects.yml
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Render README
        run: pnpm render
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open or update sync PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [[ -z "$(git status --porcelain README.md)" ]]; then
            echo "No changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B bot/sync-projects
          git add README.md
          git commit -m "chore: sync projects list"
          git push -f origin bot/sync-projects

          existing=$(gh pr list --base main --head bot/sync-projects --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "PR #$existing already open — force-push updated it."
            exit 0
          fi

          gh pr create \
            --base main \
            --head bot/sync-projects \
            --title "chore: sync projects list" \
            --body "Automated sync of the rendered projects list from \`projects.yml\` + live GitHub repo metadata." \
            --assignee TitusKirch
