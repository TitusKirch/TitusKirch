# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Cleanup Sync Branch

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  delete-branch:
    name: Delete bot/sync-projects after merge
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'bot/sync-projects'
    runs-on: ubuntu-latest
    steps:
      - name: Delete head branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          branch=bot/sync-projects
          if gh api "repos/$GH_REPO/git/refs/heads/$branch" >/dev/null 2>&1; then
            gh api -X DELETE "repos/$GH_REPO/git/refs/heads/$branch"
            echo "Deleted $branch."
          else
            echo "$branch already gone — nothing to do."
          fi
